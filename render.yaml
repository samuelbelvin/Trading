
services:
  - type: web
    name: profitable-pairs-dashboard
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: streamlit run app.py --server.address 0.0.0.0 --server.port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.11
      - key: FOREX_SYMBOLS
        value: EURUSD=X,GBPUSD=X,USDJPY=X,AUDUSD=X,USDCAD=X
      - key: CRYPTO_SYMBOLS
        value: BTC-USD,ETH-USD,SOL-USD,XRP-USD,ADA-USD
      - key: LOOKBACK_PERIOD
        value: 5d
      - key: INTERVAL
        value: 15m
      - key: AUTO_REFRESH_SECONDS
        value: "300"
