services:
  - type: web
    name: trading-dashboard
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: streamlit run app_polygon_only.py --server.address 0.0.0.0 --server.port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.11
      - key: POLYGON_API_KEY
        sync: false
      - key: POLYGON_STOCKS
        value: AAPL,NVDA,TSLA
      - key: POLYGON_FOREX
        value: C:EURUSD
      - key: POLL_SECONDS
        value: "15"
      - key: ALERT_THRESHOLD
        value: "50"
      - key: ALERT_COOLDOWN_MINUTES
        value: "20"
