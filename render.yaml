
services:
  - type: web
    name: profitable-pairs-dashboard
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: streamlit run app.py --server.address 0.0.0.0 --server.port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.11
      - key: FOREX_SYMBOLS
        value: EUR_USD,GBP_USD,USD_JPY,AUD_USD,USD_CAD
      - key: CRYPTO_SYMBOLS
        value: BTCUSDT,ETHUSDT,SOLUSDT,XRPUSDT,ADAUSDT
      - key: FOREX_GRANULARITY
        value: M15
      - key: CRYPTO_INTERVAL
        value: 15m
      - key: CANDLE_COUNT
        value: "120"
      - key: AUTO_REFRESH_SECONDS
        value: "60"
      - key: OANDA_ENV
        value: practice
      - key: OANDA_API_KEY
        sync: false
      - key: OANDA_ACCOUNT_ID
        sync: false
